# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false

[advisories]
yanked = "deny"
# Deferred advisories. All three now reach the implemented `api` and
# `cold-consumer` (not just a skeleton), so each is justified below on its own
# current merits rather than on unreachability. None reach `common`/`ingestor`/
# `hot-consumer`. Reviewed 2026-07-24.
ignore = [
    # RUSTSEC-2024-0436: `paste` 1.0.15 is unmaintained. This is an
    # informational advisory, not a vulnerability — there is no patched version
    # to move to, and `paste` is a proc-macro that runs only at compile time and
    # ships no runtime code. Reaches us via `parquet` (used directly by
    # cold-consumer, and by datafusion in the api). Removable only if the whole
    # parquet/datafusion stack drops it or migrates to `pastey`; nothing to do
    # on our side until then.
    "RUSTSEC-2024-0436",
    # RUSTSEC-2026-0194 (quadratic attribute scan) and RUSTSEC-2026-0195
    # (unbounded namespace allocation): both are quick-xml DoS bugs patched in
    # 0.41.0. We pin 0.39.4 transitively via object_store 0.13.2, which parses
    # S3/XML responses for both the api and cold-consumer. The only XML either
    # crate parses comes from our own local MinIO, never an attacker — so the
    # DoS vector is not exposed. Bump when object_store ships a quick-xml >=
    # 0.41; there is no fixed version reachable through the tree today.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
# Workspace crates are publish = false; don't lint their license fields.
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    # ring (pulled in via rustls)
    "OpenSSL",
    # webpki-roots certificate data (pulled in via tokio-tungstenite rustls)
    "CDLA-Permissive-2.0",
    # spacetimedb is Business Source License 1.1 — free under its usage terms;
    # fine for a portfolio project. TODO: review before any commercial use.
    "BUSL-1.1",
    # bzip2 compression codec (via parquet/datafusion in the implemented api).
    "bzip2-1.0.6",
]

# These SpacetimeDB client-SDK crates (pulled in via `spacetimedb-sdk`) ship a
# Business Source License 1.1 LICENSE file but declare `license = "non-standard"`,
# so cargo-deny's text matcher mis-identifies the BSL text as AGPL-3.0. Every
# LICENSE header reads "SPACETIMEDB BUSINESS SOURCE LICENSE AGREEMENT / Business
# Source License 1.1" (verified 2026-07-14, all byte-identical) — the same
# BUSL-1.1 as the main `spacetimedb` crate we already allow. The precise fix
# ([[licenses.clarify]] → BUSL-1.1) requires a file hash cargo-deny won't
# surface, so we scope a per-crate exception for the (mis-detected) AGPL license
# instead: AGPL-3.0 stays banned everywhere else, so a *genuine* AGPL dependency
# would still fail the build.
[[licenses.exceptions]]
crate = "spacetimedb-data-structures"
allow = ["AGPL-3.0-or-later"]

[[licenses.exceptions]]
crate = "spacetimedb-client-api-messages"
allow = ["AGPL-3.0-or-later"]

[[licenses.exceptions]]
crate = "spacetimedb-memory-usage"
allow = ["AGPL-3.0-or-later"]

[[licenses.exceptions]]
crate = "spacetimedb-metrics"
allow = ["AGPL-3.0-or-later"]

[[licenses.exceptions]]
crate = "spacetimedb-schema"
allow = ["AGPL-3.0-or-later"]

[[licenses.exceptions]]
crate = "spacetimedb-sdk"
allow = ["AGPL-3.0-or-later"]

[[licenses.exceptions]]
crate = "spacetimedb-sql-parser"
allow = ["AGPL-3.0-or-later"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# The internal `common` crate is a path dependency (no version), which reads as
# a wildcard; allow that for our own path deps without weakening the ban on
# wildcard requirements against registry crates.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
