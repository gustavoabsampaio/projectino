# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false

[advisories]
yanked = "deny"

[licenses]
# Workspace crates are publish = false; don't lint their license fields.
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    # ring (pulled in via rustls)
    "OpenSSL",
    # webpki-roots certificate data (pulled in via tokio-tungstenite rustls)
    "CDLA-Permissive-2.0",
    # spacetimedb is Business Source License 1.1 — free under its usage terms;
    # fine for a portfolio project. TODO: review before any commercial use.
    "BUSL-1.1",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
